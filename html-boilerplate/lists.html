<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h6> Unordered List: </h6>
    <!-- An unordered list is created with the ul tag; list items are created with the li tag -->
     <ul>
        <li> Item 1 </li>
        <li> Item 2 </li>
        <li> Item 3</li>
     </ul>

     <h6> Ordered List: </h6>
     <!-- Ordered Lists are created with the ol tag; they number each list item -->
      <ol>
        <li> Item 1 </li>
        <li> Item 2 </li>
        <li> Item 3 </li>
      </ol>
</body>
</html>
