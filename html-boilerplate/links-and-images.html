<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Links are created with the <a> anchor tag and a href attribute -->
        <a href="https://www.google.com"> Google Chrome </a>
        <br>
    <!-- Links can be created to open in a new tab with the target attribute -->
        <a href="https://www.google.com" target="_blank" rel="norefferer"> Google in new tab </a>
    <!-- Links can be absolute: links to other pages on the web (like the previous links) -->
    <!-- They can also be relative: linking to other pages within our own website -->
        <br>
        <a href="index.html" target="_blank"> index page </a>
        <br>
    
    <!-- Images are created with the <img> tag and the src attribute -->
        <img src="dog.jpg" alt="dog" height="310" width="310">
    <!-- The alt attribute creates a description for the image and will be used in place of the image if it can't be loaded -->
    <!-- The images size can be changed with the height and width attributes  -->

</body>
</html>
